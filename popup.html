<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #fafafa;
      color: #202124;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b69 100%);
      padding: 20px;
      color: #fff;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .accounts-section {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #e8eaed;
    }

    .accounts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

.account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #5f6368;
    }

    .account-item:hover {
      background: #f8f9fa;
    }

    .account-item.active {
      background: #e8f0fe;
      color: #1967d2;
    }

    .account-email {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-active-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1967d2;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .account-remove-btn {
      background: none;
      border: none;
      color: #5f6368;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-left: 4px;
    }

    .account-remove-btn:hover {
      background: #fce8e6;
      color: #c5221f;
    }

    .section {
      padding: 16px 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5f6368;
      margin-bottom: 12px;
    }

    .filter-group {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .filter-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .filter-action-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .action-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-read { background: #e8f0fe; color: #1967d2; }
    .badge-archive { background: #e6f4ea; color: #137333; }
    .badge-delete { background: #fce8e6; color: #c5221f; }
    .badge-label { background: #fef7e0; color: #b06000; }
    .badge-star { background: #fef7e0; color: #b06000; }
    .badge-important { background: #f1f3f4; color: #5f6368; }

    .filter-senders-count {
      font-size: 12px;
      color: #5f6368;
    }

    .filter-senders-list {
      display: none;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f1f3f4;
    }

    .filter-senders-list.expanded {
      display: flex;
    }

    .filter-sender-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      color: #202124;
    }

    .filter-sender-remove {
      background: none;
      border: none;
      color: #5f6368;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .filter-sender-remove:hover {
      background: #fce8e6;
      color: #c5221f;
    }

    .toggle-senders {
      background: none;
      border: none;
      color: #1a73e8;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 0;
      font-family: inherit;
    }

    .toggle-senders:hover {
      text-decoration: underline;
    }

    .delete-group-btn {
      background: none;
      border: none;
      color: #5f6368;
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .delete-group-btn:hover {
      background: #fce8e6;
      color: #c5221f;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #5f6368;
    }

    .empty-state svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.5;
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #e8eaed;
      text-align: center;
    }

    .footer a {
      font-size: 12px;
      color: #1a73e8;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      color: #1a73e8;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
    }

    .refresh-btn:hover {
      background: #f8f9fa;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #5f6368;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gmail Filter Manager</h1>
    <p>Select emails in Gmail to manage filters</p>
  </div>

  <div class="accounts-section">
    <div class="accounts-header">
      <span class="section-title" style="margin-bottom: 0;">Accounts</span>
    </div>
    <div id="accounts-list">
      <div style="text-align: center; padding: 10px 0;">
        <p style="font-size: 13px; color: #5f6368;">No account connected.<br>Select emails in Gmail and click <strong>Create Filter</strong> to sign in.</p>
      </div>
    </div>
  </div>

  <div class="section">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
      <div class="section-title" style="margin-bottom: 0;">Your Filter Groups</div>
      <button class="refresh-btn" id="refresh-btn">Refresh</button>
    </div>
    <div id="filter-groups-container">
      <div class="loading">Loading filter groups...</div>
    </div>
  </div>

  <div class="footer">
    <a id="open-gmail-filters">View all Gmail filters in settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
